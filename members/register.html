<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Taunet Nelel | Membership</title>
  <link rel="icon" href="../wp-content/uploads/2025/08/cropped-taunet_nelel_logo-32x32.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css?v=7">
  <link rel="stylesheet" href="../assets/css/members.css">
</head>
<body class="register-page">
  <div class="register-bg" aria-hidden="true"></div>
  <div class="register-overlay" aria-hidden="true"></div>

  <main class="register-shell">
    <div class="register-card">
      <a href="../index.html" class="register-logo">
        <img src="../wp-content/uploads/2025/09/taunet_nelel_logo-preview.png" alt="Taunet Nelel">
      </a>

      <div class="register-card__header">
        <h1>Join Our Community</h1>
        <p>Celebrate Kalenjin heritage and connect with members across Australia.</p>
      </div>

      <form class="register-form" id="register-form" novalidate>
        <div class="register-form__grid">
          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="Jane Kiprotich" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@email.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone <span class="label-optional">optional</span></label>
            <input type="tel" id="phone" name="phone" placeholder="+61 400 000 000" autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-password">
              <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
              <button type="button" class="input-password__toggle" aria-label="Show password" data-password-toggle="password">
                <svg class="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
        </div>

        <fieldset class="plan-picker">
          <legend>Choose your plan</legend>
          <div class="plan-picker__options">
            <label class="plan-option">
              <input type="radio" name="plan" value="basic" checked>
              <span class="plan-option__card">
                <span class="plan-option__top">
                  <span class="plan-option__name">Basic</span>
                  <span class="plan-option__price">$50<span>/year</span></span>
                </span>
                <span class="plan-option__desc">Events, workshops &amp; community access</span>
              </span>
            </label>
            <label class="plan-option">
              <input type="radio" name="plan" value="welfare">
              <span class="plan-option__card">
                <span class="plan-option__badge">Most support</span>
                <span class="plan-option__top">
                  <span class="plan-option__name">Welfare Plus</span>
                  <span class="plan-option__price">$300<span>/year</span></span>
                </span>
                <span class="plan-option__desc">All Basic benefits plus welfare support</span>
              </span>
            </label>
          </div>
        </fieldset>

        <button type="submit" class="btn btn--primary register-submit">Create account</button>

        <p class="register-form__footer">
          Already a member? <a href="login.html">Sign in</a>
          <span class="register-form__footer-sep" aria-hidden="true">·</span>
          <a href="../index.html" class="register-form__footer-link">Back to website</a>
        </p>
      </form>
    </div>
  </main>

  <script src="../assets/js/members.js"></script>
  <script>
    document.querySelectorAll('[data-password-toggle]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(btn.dataset.passwordToggle);
        if (!input) return;
        var show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.querySelector('.icon-eye').hidden = show;
        btn.querySelector('.icon-eye-off').hidden = !show;
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });
    });
  </script>
</body>
</html>
