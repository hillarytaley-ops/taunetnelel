<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Taunet Nelel Members</title>
  <link rel="icon" href="../wp-content/uploads/2025/08/cropped-taunet_nelel_logo-32x32.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css?v=7">
  <link rel="stylesheet" href="../assets/css/members.css">
</head>
<body>
  <div class="members-mobile-header">
    <a href="../index.html"><img src="../wp-content/uploads/2025/09/taunet_nelel_logo-preview.png" alt="Taunet Nelel" style="height:36px;filter:brightness(0) invert(1)"></a>
    <button class="members-menu-toggle" aria-label="Menu">☰</button>
  </div>
  <div class="members-layout">
    <aside class="members-sidebar">
      <a href="../index.html" class="logo"><img src="../wp-content/uploads/2025/09/taunet_nelel_logo-preview.png" alt="Taunet Nelel"></a>
      <ul class="members-nav">
        <li><a href="dashboard.html"><span class="icon">⌂</span> Dashboard</a></li>
        <li><a href="events.html"><span class="icon">◷</span> My Events</a></li>
        <li><a href="membership.html"><span class="icon">★</span> Membership</a></li>
        <li><a href="resources.html"><span class="icon">▤</span> Resources</a></li>
        <li><a href="welfare.html"><span class="icon">♥</span> Welfare</a></li>
        <li><a href="profile.html" class="active"><span class="icon">◎</span> Profile</a></li>
        <li><a href="support.html"><span class="icon">?</span> Support</a></li>
      </ul>
      <div class="members-sidebar__footer"><a href="#" id="logout-btn">Sign out</a></div>
    </aside>
    <main class="members-main">
      <div class="members-topbar"><h1>Profile</h1></div>
      <div class="profile-grid">
        <div class="dash-card profile-card">
          <div class="members-avatar" data-member-initials>JK</div>
          <h3 data-member-name>Member</h3>
          <p data-member-email>email@example.com</p>
          <span class="status-chip status-chip--active" style="margin-top:1rem;">Active Member</span>
        </div>
        <div class="dash-card">
          <h2>Edit Profile</h2>
          <form class="site-form" id="profile-form" style="margin-top:1rem;">
            <div class="site-form-grid">
              <div class="form-group">
                <label for="name">Full name</label>
                <input type="text" id="name" name="name" placeholder="Your full name">
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="+61 4XX XXX XXX">
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label for="suburb">Suburb / City</label>
              <input type="text" id="suburb" name="suburb" placeholder="Melbourne, VIC">
            </div>
            <div class="site-form__actions">
              <button type="submit" class="btn btn--primary">Save changes</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/members.js"></script>
</body>
</html>
